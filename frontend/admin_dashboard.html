<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com">
    if(localStorage.getItem("role") !== "admin"){
  window.location.href = "login.html";
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
h1,h2 { font-family: 'Manrope', sans-serif; }
</style>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold">CardioGuard Admin</h1>

    <div class="flex gap-6 font-medium">
        <a href="welcome_page.html" class="hover:text-blue-300">Home</a>
        <button onclick="showSection('feedback')">Feedback</button>
        <button onclick="showSection('logs')">Logs</button>
    </div>

    <button onclick="logout()" class="text-red-300 hover:text-red-500 font-semibold">
        Logout
    </button>
</nav>

<!-- MAIN -->
<div class="p-8 max-w-6xl mx-auto">

  <!-- ================= FEEDBACK ================= -->
  <div id="feedback">

    <h1 class="text-2xl font-bold mb-6">User Feedback</h1>

    <div id="feedbackList" class="space-y-4"></div>

  </div>

  <!-- ================= LOGS ================= -->
  <div id="logs" class="hidden">

    <h1 class="text-2xl font-bold mb-6">Prediction Logs</h1>

    <div id="logsList" class="space-y-4"></div>

  </div>

</div>

<!-- FOOTER -->
<footer class="mt-16 bg-gray-200 text-center py-4 text-sm text-gray-600">
    © 2024 CardioGuard • Admin Dashboard
</footer>

<!-- JS -->
<script>

// NAVIGATION
function showSection(sectionId) {
  const sections = ["feedback", "logs"];

  sections.forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });

  document.getElementById(sectionId).classList.remove("hidden");

  if(sectionId === "feedback") loadFeedback();
  if(sectionId === "logs") loadLogs();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

// LOAD FEEDBACK ✅ (CONNECTED)
function loadFeedback() {

  let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

  const container = document.getElementById("feedbackList");
  container.innerHTML = "";

  if(feedbacks.length === 0){
    container.innerHTML = "<p class='text-gray-500'>No feedback yet</p>";
    return;
  }

  feedbacks.reverse().forEach((fb, index) => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-lg shadow flex justify-between items-start">
        <div>
          <p class="font-semibold text-gray-800">${fb.name}</p>
          <p class="text-gray-600 text-sm mt-1">${fb.message}</p>
        </div>

        <button onclick="deleteFeedback(${index})"
          class="text-red-500 hover:text-red-700 font-bold">
          Delete
        </button>
      </div>
    `;
  });
}

// DELETE FEEDBACK
function deleteFeedback(index){

  let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

  feedbacks.splice(index, 1);

  localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

  loadFeedback();
}

// LOAD LOGS ✅
function loadLogs() {

  let logs = JSON.parse(localStorage.getItem("searchLogs")) || [];

  const container = document.getElementById("logsList");
  container.innerHTML = "";

  if(logs.length === 0){
    container.innerHTML = "<p class='text-gray-500'>No logs available</p>";
    return;
  }

  logs.reverse().forEach(log => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-lg shadow">
        <p><strong>Date:</strong> ${log.date}</p>
        <p><strong>Result:</strong> ${log.result}</p>
      </div>
    `;
  });
}

// AUTO LOAD FEEDBACK FIRST
window.onload = () => {
  loadFeedback();
};
function logout() {
  window.location.href = "login.html";
}

</script>

</body>
</html>
