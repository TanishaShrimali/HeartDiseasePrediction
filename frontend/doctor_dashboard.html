<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Dashboard</title>

<script src="https://cdn.tailwindcss.com">
  if(localStorage.getItem("role") !== "doctor"){
  window.location.href = "login.html";
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
h1,h2 { font-family: 'Manrope', sans-serif; }
</style>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-blue-900 text-white px-6 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold">CardioGuard Doctor</h1>

    <div class="flex gap-6 font-medium">
        <a href="welcome_page.html" class="hover:text-blue-300">Home</a>
        <button onclick="showSection('patients')">Patients</button>
        <button onclick="showSection('risk')">High Risk</button>
    </div>

    <button onclick="logout()" class="text-red-300 hover:text-red-500 font-semibold">
        Logout
    </button>
</nav>

<!-- MAIN -->
<div class="p-8 max-w-6xl mx-auto">

  <!-- ================= PATIENT LOGS ================= -->
  <div id="patients">

    <h1 class="text-2xl font-bold mb-6">Patient Prediction Logs</h1>

    <div id="patientsList" class="space-y-4"></div>

  </div>

  <!-- ================= HIGH RISK ================= -->
  <div id="risk" class="hidden">

    <h1 class="text-2xl font-bold mb-6 text-red-600">High Risk Patients</h1>

    <div id="riskList" class="space-y-4"></div>

  </div>

</div>

<!-- FOOTER -->
<footer class="mt-16 bg-gray-200 text-center py-4 text-sm text-gray-600">
    © 2024 CardioGuard • Doctor Dashboard
</footer>

<!-- JS -->
<script>

// NAVIGATION
function showSection(sectionId) {
  const sections = ["patients", "risk"];

  sections.forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });

  document.getElementById(sectionId).classList.remove("hidden");

  if(sectionId === "patients") loadPatients();
  if(sectionId === "risk") loadHighRisk();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location.href = "login.html";
}

// LOAD ALL PATIENT LOGS
function loadPatients() {

  let logs = JSON.parse(localStorage.getItem("searchLogs")) || [];

  const container = document.getElementById("patientsList");
  container.innerHTML = "";

  if(logs.length === 0){
    container.innerHTML = "<p class='text-gray-500'>No patient data available</p>";
    return;
  }

  logs.reverse().forEach(log => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-lg shadow">
        <p><strong>Date:</strong> ${log.date}</p>
        <p><strong>Result:</strong> 
          <span class="${log.result === 'Unhealthy' ? 'text-red-600 font-bold' : 'text-green-600'}">
            ${log.result}
          </span>
        </p>
      </div>
    `;
  });
}

// LOAD HIGH RISK ONLY
function loadHighRisk() {

  let logs = JSON.parse(localStorage.getItem("searchLogs")) || [];

  const container = document.getElementById("riskList");
  container.innerHTML = "";

  const highRisk = logs.filter(log => log.result === "Unhealthy");

  if(highRisk.length === 0){
    container.innerHTML = "<p class='text-gray-500'>No high risk patients</p>";
    return;
  }

  highRisk.reverse().forEach(log => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-lg shadow border-l-4 border-red-500">
        <p><strong>Date:</strong> ${log.date}</p>
        <p class="text-red-600 font-bold">High Risk Detected</p>
      </div>
    `;
  });
}

// DEFAULT LOAD
window.onload = () => {
  loadPatients();
};

</script>

</body>
</html>
