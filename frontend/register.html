<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400;
}
</style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

<!-- Register Container -->
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Heading -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-900">Create Account</h1>
        <p class="text-gray-500 text-sm">Register to get started</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">

        <!-- Name -->
        <input 
            type="text" 
            id="name"
            placeholder="Full Name"
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200"
        />

        <!-- Email -->
        <input 
            type="email" 
            id="email"
            placeholder="Email"
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200"
        />

        <!-- Password -->
        <input 
            type="password" 
            id="password"
            placeholder="Password"
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200"
        />

        <!-- Register Button -->
        <button 
            class="w-full py-3 bg-blue-700 text-white rounded-lg font-semibold hover:bg-blue-800 transition"
        >
            Register
        </button>

    </div>

    <!-- Login Link -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Already have an account?
        <a href="login.html" class="text-blue-700 font-semibold">Login</a>
    </p>

</div>

<script src="main.js"></script>

</body>
</html>
