<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Dashboard</title>

<script src="https://cdn.tailwindcss.com">
    if(localStorage.getItem("role") !== "patient"){
  window.location.href = "login.html";
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
h1,h2 { font-family: 'Manrope', sans-serif; }
</style>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-blue-900 text-white px-7 py-4 flex justify-between items-center shadow-md">
    <h1 class="text-xl font-bold tracking-wide">CardioGuard Patient</h1>

    <div class="flex gap-6 font-medium">
        <a href="welcome_page.html" class="hover:text-blue-300">Home</a>
        <button onclick="showSection('predict')" class="hover:text-blue-300">Predict</button>
        <button onclick="showSection('profile')" class="hover:text-blue-300">My Detail</button>
        <button onclick="showSection('history')" class="hover:text-blue-300">History</button>
        <button onclick="showSection('feedback')" class="hover:text-blue-300">Feedback</button>
    </div>

    <button onclick="logout()" class="text-red-300 hover:text-red-500 font-semibold">
        Logout
    </button>
</nav>

<!-- MAIN CONTENT -->
<div class="p-8 max-w-6xl mx-auto">

  <!-- ================= PREDICT ================= -->
  <div id="predict">

    <h1 class="text-2xl font-bold mb-6">Heart Disease Prediction</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

      <input id="age" type="number" placeholder="Age" class="p-3 border rounded-lg">
      
      <select id="sex" class="p-3 border rounded-lg">
        <option value="">Sex</option>
        <option value="1">Male</option>
        <option value="0">Female</option>
      </select>

      <input id="cp" type="number" placeholder="Chest Pain Type (0-3)" class="p-3 border rounded-lg">
      <input id="trestbps" type="number" placeholder="Resting BP" class="p-3 border rounded-lg">
      <input id="chol" type="number" placeholder="Cholesterol" class="p-3 border rounded-lg">

      <select id="fbs" class="p-3 border rounded-lg">
        <option value="">Fasting Sugar</option>
        <option value="1">>120</option>
        <option value="0"><=120</option>
      </select>

      <input id="restecg" type="number" placeholder="Rest ECG" class="p-3 border rounded-lg">
      <input id="thalach" type="number" placeholder="Max Heart Rate" class="p-3 border rounded-lg">

      <select id="exang" class="p-3 border rounded-lg">
        <option value="">Exercise Angina</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
      </select>

      <input id="oldpeak" type="number" placeholder="Oldpeak" class="p-3 border rounded-lg">
      <input id="slope" type="number" placeholder="Slope" class="p-3 border rounded-lg">
      <input id="ca" type="number" placeholder="CA" class="p-3 border rounded-lg">
      <input id="thal" type="number" placeholder="Thal" class="p-3 border rounded-lg">

    </div>

    <button onclick="predict()" class="mt-6 px-6 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">
      Predict
    </button>

    <div id="result" class="mt-4 text-lg font-semibold"></div>

  </div>

  <!-- ================= PROFILE ================= -->
  
<div id="profile" class="hidden">

  <h1 class="text-2xl font-bold mb-6">My Details</h1>

  <div class="bg-white rounded-xl shadow-md p-6 flex flex-col md:flex-row items-center gap-6">

    <!-- Avatar -->
    <div class="w-20 h-20 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 text-2xl font-bold">
      <span id="profileInitials">U</span>
    </div>

    <!-- Info -->
    <div class="flex-1 space-y-2 text-center md:text-left">
      <p class="text-lg font-semibold text-gray-800" id="profileName">User Name</p>
      <p class="text-gray-600" id="profileEmail">user@mail.com</p>

      <span class="inline-block mt-2 px-3 py-1 text-sm bg-blue-100 text-blue-700 rounded-full font-medium">
        Patient
      </span>
    </div>

  </div>

</div>

  <!-- ================= HISTORY ================= -->
  <div id="history" class="hidden">

    <h1 class="text-2xl font-bold mb-6">Prediction History</h1>

    <div id="historyList" class="space-y-4"></div>

  </div>

  <!-- ================= FEEDBACK ================= -->
  <div id="feedback" class="hidden">

    <h1 class="text-2xl font-bold mb-6">Feedback</h1>

    <input id="fbName" placeholder="Your Name" class="p-3 border rounded-lg w-full mb-4">
    <textarea id="fbMessage" placeholder="Your Feedback" class="p-3 border rounded-lg w-full mb-4"></textarea>

    <button onclick="submitFeedback()" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">
      Submit
    </button>

  </div>

</div>

<!-- FOOTER -->
<footer class="mt-16 bg-gray-200 text-center py-4 text-sm text-gray-600">
    © 2024 CardioGuard • Patient Dashboard
</footer>

<!-- JS -->
<script>

// NAVIGATION
function showSection(sectionId) {
  const sections = ["predict", "profile", "history", "feedback"];

  sections.forEach(id => {
    document.getElementById(id).classList.add("hidden");
  });

  document.getElementById(sectionId).classList.remove("hidden");

  if(sectionId === "history") loadHistory();
}

// LOGOUT
function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("role");
  window.location.href = "login.html";
}
// PREDICT
function predict() {

  const age = document.getElementById("age").value;

  if (!age) {
    alert("Enter required fields");
    return;
  }

  const isHealthy = Math.random() > 0.5;
  const result = isHealthy ? "Healthy" : "Unhealthy";

  document.getElementById("result").innerText = "Result: " + result;

  // SAVE HISTORY
  let logs = JSON.parse(localStorage.getItem("searchLogs")) || [];

  logs.push({
    date: new Date().toLocaleString(),
    result: result
  });

  localStorage.setItem("searchLogs", JSON.stringify(logs));
}

// LOAD HISTORY ✅ (NEW FIX)
function loadHistory() {
  let logs = JSON.parse(localStorage.getItem("searchLogs")) || [];

  const container = document.getElementById("historyList");
  container.innerHTML = "";

  logs.reverse().forEach(log => {
    container.innerHTML += `
      <div class="bg-white p-4 rounded-lg shadow">
        <p><strong>Date:</strong> ${log.date}</p>
        <p><strong>Result:</strong> ${log.result}</p>
      </div>
    `;
  });
}

// FEEDBACK SAVE ✅
function submitFeedback() {

  const name = document.getElementById("fbName").value;
  const message = document.getElementById("fbMessage").value;

  if (!name || !message) {
    alert("Fill all fields");
    return;
  }

  let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

  feedbacks.push({
    name,
    message
  });

  localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

  alert("Feedback submitted!");

  document.getElementById("fbName").value = "";
  document.getElementById("fbMessage").value = "";
}

// LOAD PROFILE
window.onload = () => {
  document.getElementById("profileEmail").innerText =
    localStorage.getItem("user") || "user@mail.com";
};
window.onload = () => {

  const email = localStorage.getItem("user") || "user@mail.com";

  document.getElementById("profileEmail").innerText = email;

  // Extract name (before @)
  const name = email.split("@")[0];
  document.getElementById("profileName").innerText = name;

  // Initials
  document.getElementById("profileInitials").innerText = name.charAt(0).toUpperCase();
};

</script>

</body>
</html>
