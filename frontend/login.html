<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400;
}
body {
    font-family: 'Inter', sans-serif;
}
h1 {
    font-family: 'Manrope', sans-serif;
}
</style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<!-- Login Container -->
<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <!-- Heading -->
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-900">Welcome Back</h1>
        <p class="text-gray-500 text-sm">Login to continue</p>
    </div>

    <!-- Form -->
    <div class="space-y-4">

        <!-- Email -->
        <input 
            id="email"
            type="email" 
            placeholder="Email"
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200"
        />

        <!-- Password -->
        <input 
            id="password"
            type="password" 
            placeholder="Password"
            class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-200"
        />

        <!-- Role Selection -->
        <select 
            id="role"
            class="w-full px-4 py-3 border rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-200"
        >
            <option value="">Select Role</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
            <option value="admin">Admin</option>
        </select>

        <!-- Login Button -->
        <button 
            onclick="loginUser()"
            class="w-full py-3 bg-blue-700 text-white rounded-lg font-semibold hover:bg-blue-800 transition"
        >
            Login
        </button>

    </div>

    <!-- Register Link -->
    <p class="text-center text-sm text-gray-500 mt-6">
        Don’t have an account?
        <a href="register.html" class="text-blue-700 font-semibold">Register</a>
    </p>

</div>

<!-- Main JS -->
<script src="main.js"></script>

</body>
</html>
