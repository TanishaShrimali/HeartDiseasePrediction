<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Feedback | CardioGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" data-patient-page="true" data-required-role="patient">
  <nav class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="index.html" class="text-2xl font-extrabold text-blue-900">CardioGuard</a>
      <div class="flex flex-wrap items-center gap-5 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-blue-700">Home</a>
        <a href="patient_dashboard.html" class="hover:text-blue-700">Dashboard</a>
        <a href="patient_predict.html" class="hover:text-blue-700">Predict</a>
        <a href="patient_mydetail.html" class="hover:text-blue-700">My Detail</a>
        <a href="patient_history.html" class="hover:text-blue-700">History</a>
        <a href="patient_feedback.html" class="text-blue-700">Feedback</a>
        <a href="login.html" data-logout="true" class="hover:text-blue-700">Logout</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto grid max-w-7xl gap-8 px-6 py-10 lg:grid-cols-[0.9fr_1.1fr]">
    <section class="rounded-3xl bg-gradient-to-br from-blue-900 to-cyan-700 p-8 text-white shadow-xl">
      <p class="text-xs font-bold uppercase tracking-[0.25em] text-blue-100">We value your voice</p>
      <h1 class="mt-3 text-4xl font-extrabold">Patient Feedback</h1>
      <p class="mt-4 text-sm leading-6 text-blue-50">Submit feedback and store it in the feedback table for admin review.</p>
      <div class="mt-8 flex flex-wrap gap-3">
        <a href="patient_dashboard.html" class="rounded-xl bg-white px-4 py-2 text-sm font-bold text-blue-900">Dashboard</a>
        <a href="patient_history.html" class="rounded-xl border border-white/40 px-4 py-2 text-sm font-bold text-white">History</a>
      </div>
    </section>

    <section class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
      <form id="patient-feedback-form" class="space-y-5">
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Name</label>
          <input id="feedback-name" type="text" placeholder="Enter your name" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Email</label>
          <input id="feedback-email" type="email" placeholder="Enter your email" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
        </div>
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Feedback</label>
          <textarea id="feedback-message" rows="6" placeholder="Share your experience" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500"></textarea>
        </div>
        <button type="submit" class="rounded-xl bg-blue-700 px-6 py-3 font-bold text-white">Submit Feedback</button>
      </form>

      <div class="mt-8 grid gap-4 md:grid-cols-3">
        <a href="patient_predict.html" class="rounded-2xl bg-slate-100 p-4 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Go to Predict</a>
        <a href="patient_mydetail.html" class="rounded-2xl bg-slate-100 p-4 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Go to My Detail</a>
        <a href="patient_history.html" class="rounded-2xl bg-slate-100 p-4 text-sm font-semibold text-slate-700 hover:bg-blue-50 hover:text-blue-700">Go to History</a>
      </div>
    </section>
  </main>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/patient.js"></script>
</body>
</html>
