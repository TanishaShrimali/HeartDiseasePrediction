<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
</style>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-blue-900 text-white px-7 py-4 flex justify-between">
    <h1 class="font-bold">CardioGuard</h1>
    
    <button onclick="logout()" class="text-red-300">Logout</button>
</nav>

<div class="p-8 max-w-5xl mx-auto">

<h1 class="text-2xl font-bold mb-6">Heart Disease Prediction</h1>

<div class="grid grid-cols-2 gap-4">

<input id="age" type="number" placeholder="Age" class="p-3 border rounded">

<select id="sex" class="p-3 border rounded">
<option value="">Sex</option>
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<input id="cp" placeholder="Chest Pain Type" class="p-3 border rounded">
<input id="trestbps" placeholder="Resting BP" class="p-3 border rounded">
<input id="chol" placeholder="Cholesterol" class="p-3 border rounded">

<select id="fbs" class="p-3 border rounded">
<option value="">Fasting Sugar</option>
<option value="1">>120</option>
<option value="0"><=120</option>
</select>

<input id="restecg" placeholder="Rest ECG" class="p-3 border rounded">
<input id="thalach" placeholder="Max Heart Rate" class="p-3 border rounded">

<select id="exang" class="p-3 border rounded">
<option value="">Exercise Angina</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input id="oldpeak" placeholder="Oldpeak" class="p-3 border rounded">
<input id="slope" placeholder="Slope" class="p-3 border rounded">

</div>

<button onclick="predict()" class="mt-6 px-6 py-3 bg-blue-600 text-white rounded">
Predict
</button>

<div id="result" class="mt-4 text-lg font-bold"></div>
<div id="doctors" class="mt-4"></div>

<h2 class="mt-8 font-bold">History</h2>
<div id="historyList"></div>

</div>

<!-- ✅ ONLY MAIN JS -->
<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
