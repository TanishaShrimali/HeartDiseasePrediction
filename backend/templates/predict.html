<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Manrope:wght@700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }
h1 { font-family: 'Manrope', sans-serif; }
</style>
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-blue-900 text-white px-6 py-4 flex justify-between">
  <h1 class="text-xl font-bold">CardioGuard</h1>
  <button onclick="logout()" class="text-red-300">Logout</button>
</nav>

<div class="max-w-6xl mx-auto p-8 grid md:grid-cols-2 gap-10">

<!-- ================= FORM ================= -->
<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Enter Details</h2>

<div class="grid grid-cols-2 gap-4">

<input id="age" type="number" placeholder="Age" class="p-2 border rounded">

<select id="sex" class="p-2 border rounded">
<option value="">Sex</option>
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<input id="cp" type="number" placeholder="Chest Pain (0-3)" class="p-2 border rounded">
<input id="trestbps" type="number" placeholder="BP" class="p-2 border rounded">

<input id="chol" type="number" placeholder="Cholesterol" class="p-2 border rounded">

<select id="fbs" class="p-2 border rounded">
<option value="">FBS</option>
<option value="1">>120</option>
<option value="0"><=120</option>
</select>

<input id="restecg" type="number" placeholder="ECG" class="p-2 border rounded">
<input id="thalach" type="number" placeholder="Heart Rate" class="p-2 border rounded">

<select id="exang" class="p-2 border rounded">
<option value="">Angina</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<input id="oldpeak" type="number" placeholder="Oldpeak" class="p-2 border rounded">
<input id="slope" type="number" placeholder="Slope" class="p-2 border rounded">

</div>

<button onclick="predict()" class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg">
Predict
</button>

</div>

<!-- ================= RESULT ================= -->
<div class="bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold mb-4">Result</h2>

<div id="result" class="text-lg font-semibold text-blue-700"></div>

<div id="doctors" class="mt-4 text-sm text-gray-700"></div>

</div>

</div>

<script src="main.js"></script>

</body>
</html>
