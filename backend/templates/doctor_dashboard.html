<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard | CardioGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" data-required-role="doctor">
  <div class="flex min-h-screen">
    <aside class="w-72 border-r border-slate-200 bg-white p-6">
      <a href="doctor_dashboard.html" class="text-2xl font-extrabold text-blue-900">CardioGuard</a>
      <p class="mt-1 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Doctor</p>
      <nav class="mt-8 space-y-2">
        <a href="doctor_dashboard.html" class="block rounded-xl bg-blue-700 px-4 py-3 text-sm font-bold text-white">Dashboard</a>
        <a href="doctor_patientrecords.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Patient Records</a>
        <a href="index.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Home</a>
        <a href="login.html" data-logout="true" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Logout</a>
      </nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-4xl font-extrabold text-slate-900">Doctor Dashboard</h1>
          <p class="mt-2 text-slate-600">Overview based on the current data available in the system.</p>
        </div>
        <a href="doctor_patientrecords.html" class="rounded-xl bg-blue-700 px-4 py-2 text-sm font-bold text-white">Open Patient Records</a>
      </div>

      <section class="mt-8 grid gap-6 md:grid-cols-3">
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Patients</p>
          <p id="doctor-total-patients" class="mt-3 text-4xl font-extrabold text-slate-900">-</p>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Predictions</p>
          <p id="doctor-total-predictions" class="mt-3 text-4xl font-extrabold text-slate-900">-</p>
        </div>
        <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <p class="text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Feedback</p>
          <p id="doctor-total-feedback" class="mt-3 text-4xl font-extrabold text-slate-900">-</p>
        </div>
      </section>

      <section class="mt-10 rounded-3xl border border-slate-200 bg-white shadow-sm overflow-hidden">
        <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200">
          <h2 class="text-2xl font-extrabold text-slate-900">Recent Patients</h2>
          <a href="doctor_patientrecords.html" class="text-sm font-semibold text-blue-700">View all</a>
        </div>
        <table class="min-w-full">
          <thead class="bg-slate-100">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Name</th>
              <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Email</th>
            </tr>
          </thead>
          <tbody id="doctor-recent-patients"></tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/doctor.js"></script>
</body>
</html>
