<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | CardioGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" data-auth-entry="true">
  <main class="mx-auto flex min-h-screen max-w-6xl items-center px-6 py-12">
    <div class="grid w-full overflow-hidden rounded-[2rem] bg-white shadow-2xl lg:grid-cols-[0.95fr_1fr]">
      <section class="bg-gradient-to-br from-slate-900 to-blue-900 p-10 text-white">
        <a href="index.html" class="text-2xl font-extrabold">CardioGuard</a>
        <h1 class="mt-10 text-4xl font-extrabold leading-tight">Reset a patient or doctor password.</h1>
        <p class="mt-4 max-w-md text-sm leading-7 text-blue-100">
          Choose the account role, enter the registered email, and set a new password. Admin reset is intentionally not available on this page.
        </p>
      </section>

      <section class="p-10">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-3xl font-extrabold text-slate-900">Forgot Password</h2>
            <p class="mt-2 text-sm text-slate-600">Available for patient and doctor accounts.</p>
          </div>
          <a href="login.html" class="text-sm font-semibold text-blue-700">Back to Login</a>
        </div>

        <form class="mt-8 space-y-5" onsubmit="resetPassword(event)">
          <div>
            <label for="reset-role" class="mb-2 block text-sm font-semibold text-slate-700">Role</label>
            <select id="reset-role" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
              <option value="">Select role</option>
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
            </select>
          </div>

          <div>
            <label for="reset-email" class="mb-2 block text-sm font-semibold text-slate-700">Registered Email</label>
            <input id="reset-email" type="email" placeholder="Enter the account email" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
          </div>

          <div>
            <label for="reset-password" class="mb-2 block text-sm font-semibold text-slate-700">New Password</label>
            <input id="reset-password" type="password" placeholder="Enter a new password" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
          </div>

          <div>
            <label for="reset-confirm-password" class="mb-2 block text-sm font-semibold text-slate-700">Confirm Password</label>
            <input id="reset-confirm-password" type="password" placeholder="Confirm the new password" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
          </div>

          <button type="submit" class="w-full rounded-xl bg-blue-700 px-6 py-3 font-bold text-white">
            Update Password
          </button>
        </form>
      </section>
    </div>
  </main>
  <script src="../static/js/auth.js"></script>
  <script src="../static/vendor/bcryptjs.js"></script>
  <script src="../static/js/main.js"></script>
</body>
</html>
