<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Doctors | CardioGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" data-required-role="admin">
  <div class="flex min-h-screen">
    <aside class="w-72 border-r border-slate-200 bg-white p-6">
      <a href="admin_dashboard.html" class="text-2xl font-extrabold text-blue-900">CardioGuard</a>
      <p class="mt-1 text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Admin</p>
      <nav class="mt-8 space-y-2">
        <a href="admin_dashboard.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Dashboard</a>
        <a href="admin_managedoctors.html" class="block rounded-xl bg-blue-700 px-4 py-3 text-sm font-bold text-white">Manage Doctors</a>
        <a href="admin_viewpatients.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">View Patients</a>
        <a href="admin_viewfeedbacks.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">View Feedback</a>
        <a href="index.html" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Home</a>
        <a href="login.html" data-logout="true" class="block rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-100">Logout</a>
      </nav>
    </aside>

    <main class="flex-1 p-8 space-y-8">
      <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
          <h1 class="text-4xl font-extrabold text-slate-900">Manage Doctors</h1>
          <p class="mt-2 text-slate-600">Add doctor accounts, review them, and edit existing doctor records.</p>
        </div>
        <a href="admin_dashboard.html" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700">Back to Dashboard</a>
      </div>

      <div class="grid gap-8 lg:grid-cols-[0.95fr_1.05fr]">
        <section class="rounded-3xl bg-white p-8 shadow-sm border border-slate-200">
          <div class="flex items-center justify-between gap-4">
            <h2 id="doctor-form-title" class="text-2xl font-extrabold text-slate-900">Add Doctor</h2>
            <button id="doctor-form-cancel" type="button" class="hidden rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700">Cancel Edit</button>
          </div>
          <form id="add-doctor-form" class="mt-6 space-y-4">
            <input id="doctor-name" type="text" placeholder="Full name" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
            <input id="doctor-specialization" type="text" placeholder="Specialization" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
            <input id="doctor-location" type="text" placeholder="Location" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
            <input id="doctor-email" type="email" placeholder="Email" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
            <input id="doctor-password" type="password" placeholder="Password" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:border-blue-500">
            <button id="doctor-form-submit" type="submit" class="w-full rounded-xl bg-blue-700 px-6 py-3 font-bold text-white">Add Doctor</button>
          </form>
        </section>

        <section class="rounded-3xl bg-white shadow-sm border border-slate-200 overflow-hidden">
          <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200">
            <h2 class="text-2xl font-extrabold text-slate-900">Doctor List</h2>
            <span class="text-sm font-semibold text-slate-500">Total: <span id="admin-doctors-count">0</span></span>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full">
              <thead class="bg-slate-100">
                <tr>
                  <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Name</th>
                  <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Specialization</th>
                  <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Location</th>
                  <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Email</th>
                  <th class="px-6 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Action</th>
                </tr>
              </thead>
              <tbody id="admin-doctors-body"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/admin.js"></script>
</body>
</html>
