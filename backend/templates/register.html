<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; }
</style>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <h1 class="text-2xl font-bold text-blue-900 text-center mb-6">
        Create Account
    </h1>

    <input id="name" type="text" placeholder="Full Name"
        class="w-full px-4 py-3 border rounded-lg mb-4">

    <input id="email" type="email" placeholder="Email"
        class="w-full px-4 py-3 border rounded-lg mb-4">

    <input id="password" type="password" placeholder="Password"
        class="w-full px-4 py-3 border rounded-lg mb-4">

    <!-- ✅ FIXED BUTTON -->
    <button 
        onclick="registerUser()"
        class="w-full py-3 bg-blue-700 text-white rounded-lg font-semibold hover:bg-blue-800 transition">
        Register
    </button>

    <p class="text-center text-sm mt-6">
        Already have an account?
        <a href="/login" class="text-blue-700 font-semibold">Login</a>
    </p>

</div>

<!-- ✅ FIXED JS -->
<script src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
