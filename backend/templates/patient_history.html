<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient History | CardioGuard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" data-patient-page="true" data-required-role="patient">
  <nav class="sticky top-0 z-20 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="index.html" class="text-2xl font-extrabold text-blue-900">CardioGuard</a>
      <div class="flex flex-wrap items-center gap-5 text-sm font-semibold text-slate-600">
        <a href="index.html" class="hover:text-blue-700">Home</a>
        <a href="patient_dashboard.html" class="hover:text-blue-700">Dashboard</a>
        <a href="patient_predict.html" class="hover:text-blue-700">Predict</a>
        <a href="patient_mydetail.html" class="hover:text-blue-700">My Detail</a>
        <a href="patient_history.html" class="text-blue-700">History</a>
        <a href="patient_feedback.html" class="hover:text-blue-700">Feedback</a>
        <a href="login.html" data-logout="true" class="hover:text-blue-700">Logout</a>
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-7xl px-6 py-10 space-y-8">
    <section class="rounded-3xl border border-slate-200 bg-white p-8 shadow-sm">
      <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="text-xs font-bold uppercase tracking-[0.25em] text-blue-700">Patient History</p>
          <h1 class="mt-3 text-4xl font-extrabold text-slate-900">Recent Predictions</h1>
          <p class="mt-2 text-slate-600">Prediction history retrieved from SQLite for the current patient account.</p>
        </div>
        <span class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm font-semibold text-slate-600">Total: <span id="patient-history-count">0</span></span>
      </div>

      <div class="mt-8 overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-100">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Date</th>
              <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Result</th>
              <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-[0.2em] text-slate-500">Status</th>
            </tr>
          </thead>
          <tbody id="patient-history-body" class="divide-y divide-slate-200"></tbody>
        </table>
      </div>
    </section>

    <section class="grid gap-4 md:grid-cols-3">
      <a href="patient_predict.html" class="rounded-2xl border border-slate-200 bg-white p-5 text-sm font-semibold text-slate-700 shadow-sm hover:border-blue-500 hover:text-blue-700">Run New Prediction</a>
      <a href="patient_mydetail.html" class="rounded-2xl border border-slate-200 bg-white p-5 text-sm font-semibold text-slate-700 shadow-sm hover:border-blue-500 hover:text-blue-700">Review My Detail</a>
      <a href="patient_feedback.html" class="rounded-2xl border border-slate-200 bg-white p-5 text-sm font-semibold text-slate-700 shadow-sm hover:border-blue-500 hover:text-blue-700">Give Feedback</a>
    </section>
  </main>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/patient.js"></script>
</body>
</html>
