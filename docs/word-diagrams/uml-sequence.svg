<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><rect x="0" y="0" width="1400" height="760" fill="#ffffff" /><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/></marker></defs><text x="700.0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">UML Sequence Diagram</text><rect x="50" y="70" width="140" height="50" rx="10" ry="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/><text x="120.0" y="100.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Patient</text><line x1="120" y1="120" x2="120" y2="700" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,6"/><rect x="310" y="70" width="140" height="50" rx="10" ry="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/><text x="380.0" y="100.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Web UI</text><line x1="380" y1="120" x2="380" y2="700" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,6"/><rect x="610" y="70" width="140" height="50" rx="10" ry="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="680.0" y="100.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">Flask App</text><line x1="680" y1="120" x2="680" y2="700" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,6"/><rect x="890" y="70" width="140" height="50" rx="10" ry="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="960.0" y="100.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#111827">ML Model</text><line x1="960" y1="120" x2="960" y2="700" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,6"/><rect x="1150" y="70" width="140" height="50" rx="10" ry="10" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="1220.0" y="100.0" text-anchor="middle" font-family="Arial, sans-